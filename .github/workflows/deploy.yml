name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bundle size check (PERF-01 gate)
        run: bash scripts/bundle-check.sh

      - name: Upload stats.html artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: dist/stats.html
          if-no-files-found: warn

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  lighthouse:
    runs-on: ubuntu-latest
    needs: deploy
    env:
      page_url: ${{ needs.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse CLI
        run: npm install -g lighthouse

      - name: Run Lighthouse PWA audit
        run: |
          PAGE_URL="${page_url}"
          if [ -z "$PAGE_URL" ]; then
            # Construct URL from repo owner/name if output unavailable
            PAGE_URL="https://${{ github.repository_owner }}.github.io/flappy-3d/"
          fi
          echo "Auditing: $PAGE_URL"
          lighthouse "$PAGE_URL" \
            --only-categories=pwa \
            --output=json \
            --output-path=lighthouse-pwa.json \
            --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage" \
            --quiet || true

      - name: Check PWA score (gate: >= 0.90)
        run: |
          if [ ! -f lighthouse-pwa.json ]; then
            echo "ERROR: lighthouse-pwa.json not found. Lighthouse may have failed to run."
            exit 1
          fi
          SCORE=$(cat lighthouse-pwa.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['categories']['pwa']['score'])")
          echo "Lighthouse PWA score: $SCORE"
          # Compare as float using python3 (avoids bc locale issues)
          PASS=$(python3 -c "print('yes' if float('$SCORE') >= 0.9 else 'no')")
          if [ "$PASS" != "yes" ]; then
            echo "FAIL: PWA score $SCORE < 0.90 (PWA-05 requirement)"
            exit 1
          fi
          echo "PASS: PWA score $SCORE >= 0.90"

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: lighthouse-pwa.json
